<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 · Page Not Found | Daniele Raimondi</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="/assets/favicon.ico" sizes="any">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Public Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #1a1f2a;
            background:
                radial-gradient(circle at 7% 10%, rgba(31, 79, 143, 0.12), transparent 34%),
                radial-gradient(circle at 86% 10%, rgba(177, 93, 50, 0.14), transparent 32%),
                linear-gradient(180deg, #faf6ef 0%, #f3ede2 100%);
        }
        .card {
            text-align: center;
            background: #fffdf8;
            border: 1px solid #d8cfc0;
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 460px;
            box-shadow: 0 16px 42px rgba(10, 20, 50, 0.12);
        }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 4.5rem;
            color: #1f4f8f;
            line-height: 1;
        }
        h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            margin: 12px 0 8px;
            color: #17243a;
        }
        p { color: #596172; font-size: 0.95rem; margin-bottom: 24px; }
        a {
            display: inline-block;
            color: #ffffff;
            background: linear-gradient(115deg, #1f4f8f, #14386a);
            text-decoration: none;
            font-weight: 600;
            padding: 12px 26px;
            border-radius: 999px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        a:hover { transform: translateY(-2px); box-shadow: 0 10px 22px rgba(31, 79, 143, 0.3); }
    </style>
</head>
<body>
    <main class="card">
        <h1>404</h1>
        <h2>This page doesn't exist</h2>
        <p>The page you're looking for was moved or never existed. Let's get you back on track.</p>
        <a href="/">← Back to home</a>
    </main>
    <script>
    // Follow the language chosen on the main site (EN/IT flag toggle)
    (function () {
        if (localStorage.getItem('site_lang') !== 'it') return;
        document.documentElement.lang = 'it';
        document.title = '404 · Pagina Non Trovata | Daniele Raimondi';
        document.querySelector('h2').textContent = 'Questa pagina non esiste';
        document.querySelector('p').textContent = 'La pagina che cerchi è stata spostata o non è mai esistita. Torniamo in carreggiata.';
        document.querySelector('a').textContent = '← Torna alla home';
    })();
    </script>
</body>
</html>
